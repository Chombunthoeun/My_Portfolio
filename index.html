<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunthoeun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="header">
        <div class="container">
            <a href="/" id="logo">Buntheoun</a>
            <ul class="menu">
                <li><a href="/" id="menu-active">Home</a></li>
                <li><a href="/">Achievement<i class="fas fa-chevron-down"></i></a></li>
                <li><a href="/">Services<i class="fas fa-chevron-down"></i></a></li>
                <li><a href="/">About</a></li>
            </ul>
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </section>

    <section class="main-avata">
        <div class="avata-container">
            <div class="main-left">
                <p id="l1">Hello Everyone!!!</p>
                <p id="l2">I'm Chom Bunthoeun</p>
                <p id="l3">Full-Stack Web Developer</p>
            </div>
            <div class="main-right">
                <img src="imgs/Mypicture.png" alt="avata" id="avata">
                <div id="background-circle"></div>
            </div>
        </div>
    </section>
    <!-- acheivement -->
    <section class="acheivements">
        <h1 class="header-title">
            Acheivements
        </h1>
        <div class="card-group">
            <div class="card">
                <img src="imgs/acheivement-img.jpg" alt="acheivements-img" id="acheivements-img">
            </div>
            <div class="card">
                 <img src="imgs/MyAcheivment.png" alt="acheivements-img" id="acheivements-img">
            </div>
            <div class="card"></div>
            <div class="card"></div>
        </div>
    </section>
    <!-- about me -->

    <section class="about-me-group">
         <h1 class="header-title">
            About Me
        </h1>
        <div class="aboutMe-text">
            <div class="about-left">
                <img src="imgs/Mypicture.png" alt="avata" id="about-avata">
                <div class="about-programminglanguage">
                    <img src="imgs/Html.png" alt="" id="about-html">
                    <img src="imgs/javascrip.png" alt="" id="about-javascript">
                    <img src="imgs/css.png" alt="" id="about-css">
                </div>
                <div class="about-programminglanguage-2">
                    <img src="imgs/php.png" alt="" id="about-php">
                    <img src="imgs/Laravel.png" alt="" id="about-laravel">
                    <img src="imgs/django.png" alt="" id="about-django">

                </div>
                <div class="about-programminglanguage-3">
                    <img src="imgs/flutter.png" alt="" id="about-flutter">
                </div>
            </div>
            <p class="about-text"> 
                Hello I'm Bunthoeun and i'm a Software Developer and also a teacher at KKEV oranizations
            </p>
        </div>

        <div class="about-btn">
            <button id="download-cv-btn">
                Download CV
            </button>

            <button id="hire-me-btn">
                Hire Me
            </button>
        </div>
    </section>

    
</body>
</html>
